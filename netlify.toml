[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# O13 cutover: only graph-backed alert scheduled functions remain active on Netlify.
# Data, ML, and weekly producer/mutation schedules are owned by Hermes/systemd operating-goal wrappers.

[functions."cron-alerts-scan"]
  schedule = "0 */6 * * *"

[functions."cron-alerts-send"]
  schedule = "15 */6 * * *"
