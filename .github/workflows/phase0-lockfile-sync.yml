name: Phase 0 lockfile sync

on:
  push:
    branches:
      - phase/0-foundation

permissions:
  contents: write

jobs:
  sync-lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: phase/0-foundation
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Regenerate npm lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Commit lockfile and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git rm .github/workflows/phase0-lockfile-sync.yml
          git commit -m "chore: sync phase 0 package lock" || exit 0
          git push origin HEAD:phase/0-foundation
